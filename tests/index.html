<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Image Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .image-container {
            background: #f5f5f5;
            border-radius: 8px;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            overflow: hidden;
            position: relative;
        }

        #image {
            max-width: 100%;
            max-height: 600px;
            display: block;
        }

        .placeholder-text {
            color: #999;
            font-size: 1.1rem;
            padding: 20px;
        }

        .error {
            color: #dc3545;
            font-size: 1rem;
            padding: 20px;
            background: #fee;
            border-radius: 4px;
        }

        .error a {
            color: #0066cc;
            text-decoration: underline;
        }

        .metadata {
            color: #666;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        #generate-btn {
            background: #667eea;
            color: white;
        }

        #generate-btn:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        #download-btn {
            background: #28a745;
            color: white;
        }

        #download-btn:hover:not(:disabled) {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.4);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .buttons {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <h1>Random Image Generator</h1>

        <div class="image-container">
            <div class="placeholder-text" id="placeholder">
                Нажмите "Генерировать" для получения случайного изображения
            </div>
            <img id="image" alt="Случайное изображение" style="display: none;">
            <div id="error" class="error" style="display: none;"></div>
        </div>

        <div class="metadata" id="metadata" style="display: none;">
            <span id="id-display"></span> |
            <span id="size-display"></span>
        </div>

        <div class="buttons">
            <button id="generate-btn">Генерировать</button>
            <button id="download-btn" disabled>Скачать</button>
        </div>
    </main>

    <script>
        const generateBtn = document.getElementById('generate-btn');
        const downloadBtn = document.getElementById('download-btn');
        const image = document.getElementById('image');
        const placeholder = document.getElementById('placeholder');
        const errorDiv = document.getElementById('error');
        const metadata = document.getElementById('metadata');
        const idDisplay = document.getElementById('id-display');
        const sizeDisplay = document.getElementById('size-display');

        let currentImageUrl = '';
        let currentImageId = '';

        function generateImage() {
            const timestamp = Date.now();
            const imageUrl = `https://picsum.photos/800/600?random=${timestamp}`;

            currentImageUrl = imageUrl;
            currentImageId = timestamp.toString();

            placeholder.style.display = 'none';
            errorDiv.style.display = 'none';
            errorDiv.innerHTML = '';
            image.style.display = 'none';

            image.src = imageUrl;
        }

        generateBtn.addEventListener('click', generateImage);

        function handleImageLoad() {
            image.style.display = 'block';
            downloadBtn.disabled = false;

            const width = image.naturalWidth;
            const height = image.naturalHeight;

            idDisplay.textContent = `ID: ${currentImageId}`;
            sizeDisplay.textContent = `Размер: ${width} × ${height} px`;
            metadata.style.display = 'block';
        }

        image.addEventListener('load', handleImageLoad);

        function handleImageError() {
            image.style.display = 'none';
            downloadBtn.disabled = true;
            metadata.style.display = 'none';

            errorDiv.innerHTML = `
                Не удалось загрузить изображение. picsum.photos может быть недоступен.<br>
                <a href="${currentImageUrl}" target="_blank">Открыть в новой вкладке →</a>
            `;
            errorDiv.style.display = 'block';
        }

        image.addEventListener('error', handleImageError);

        async function downloadImage() {
            try {
                const response = await fetch(currentImageUrl);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `picsum-${currentImageId}.jpg`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (error) {
                console.error('Download failed:', error);
                downloadBtn.disabled = true;
                metadata.style.display = 'none';
                errorDiv.innerHTML = `
                    Не удалось скачать изображение (CORS ограничение браузера).<br>
                    <a href="${currentImageUrl}" target="_blank">Открыть в новой вкладке →</a>
                `;
                errorDiv.style.display = 'block';
                image.style.display = 'none';
            }
        }

        downloadBtn.addEventListener('click', downloadImage);
    </script>
</body>
</html>
