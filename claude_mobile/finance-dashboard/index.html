<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f3f6fa;
      --bg-elevated: #eef3f8;
      --surface: #ffffff;
      --surface-2: #f7fafc;
      --surface-3: #eef2f7;
      --text: #16202d;
      --muted: #64748b;
      --border: #d8e0ea;
      --border-strong: #bfd0e2;
      --accent: #1d4ed8;
      --accent-strong: #153e9f;
      --accent-soft: rgba(29, 78, 216, 0.08);
      --accent-contrast: #ffffff;
      --success: #0f766e;
      --warning: #b45309;
      --danger: #dc2626;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.06);
    }

    :root[data-theme="dark"] {
      --bg: #060b14;
      --bg-elevated: #0b1220;
      --surface: #0f1728;
      --surface-2: #111c2e;
      --surface-3: #162135;
      --text: #edf2f7;
      --muted: #94a3b8;
      --border: #253247;
      --border-strong: #334155;
      --accent: #60a5fa;
      --accent-strong: #93c5fd;
      --accent-soft: rgba(96, 165, 250, 0.14);
      --accent-contrast: #07111f;
      --success: #2dd4bf;
      --warning: #f59e0b;
      --danger: #f87171;
      --shadow: 0 18px 42px rgba(2, 6, 23, 0.45);
    }

    * { box-sizing: border-box; }
    html, body, #root { min-height: 100%; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(29, 78, 216, 0.08), transparent 34%),
        radial-gradient(circle at top right, rgba(15, 118, 110, 0.08), transparent 30%),
        var(--bg);
      color: var(--text);
      overflow-x: hidden;
      font-family: "IBM Plex Sans", Inter, system-ui, sans-serif;
    }
    button, input, select, textarea { font: inherit; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    ::selection { background: var(--accent-soft); color: var(--text); }
    .app-shell { min-height: 100vh; color: var(--text); }
    .topbar {
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }
    .kicker {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 0.7rem;
      font-weight: 700;
    }
    .title {
      font-size: clamp(1.25rem, 1.6vw, 1.8rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
      font-weight: 700;
    }
    .lead {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.4;
    }
    .card {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 20px;
      box-shadow: var(--shadow);
    }
    .card-soft { background: var(--surface-2); }
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 14px;
      margin-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .card-title {
      font-size: 1rem;
      line-height: 1.15;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .card-subtitle {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.4;
      margin-top: 4px;
    }
    .nav-pill {
      min-width: 0;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      border-radius: 14px;
      padding: 0.8rem 0.9rem;
      text-align: left;
      transition: border-color 150ms ease, background-color 150ms ease, color 150ms ease, transform 150ms ease;
    }
    .nav-pill:hover { border-color: var(--border-strong); color: var(--text); }
    .nav-pill[data-active="true"] {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--text);
    }
    .nav-pill-main {
      display: block;
      font-size: 0.94rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .nav-pill-sub {
      display: block;
      margin-top: 2px;
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .theme-pill {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--muted);
      border-radius: 999px;
      padding: 0.52rem 0.8rem;
      font-size: 0.75rem;
      font-weight: 700;
      transition: border-color 150ms ease, color 150ms ease, background-color 150ms ease;
    }
    .theme-pill[data-active="true"] {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--text);
    }
    .ui-input {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface-2);
      color: var(--text);
      padding: 0.76rem 0.9rem;
      transition: border-color 150ms ease, box-shadow 150ms ease, background-color 150ms ease;
    }
    .ui-input--compact {
      padding-block: 0.56rem;
      padding-inline: 0.72rem;
      font-size: 0.94rem;
    }
    .ui-input--large {
      padding-block: 0.94rem;
      padding-inline: 1rem;
      font-size: 1.02rem;
    }
    .ui-input--right {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .ui-input::placeholder { color: var(--muted); }
    .ui-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .ui-input:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .ui-button {
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.78rem 0.95rem;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: border-color 150ms ease, background-color 150ms ease, color 150ms ease, opacity 150ms ease;
    }
    .ui-button-primary {
      background: var(--accent);
      color: var(--accent-contrast);
      border-color: var(--accent);
    }
    .ui-button-primary:hover { background: var(--accent-strong); border-color: var(--accent-strong); }
    .ui-button-secondary {
      background: var(--surface-2);
      color: var(--text);
    }
    .ui-button-secondary:hover { border-color: var(--border-strong); }
    .ui-button-ghost {
      background: transparent;
      color: var(--muted);
    }
    .ui-button-ghost:hover { color: var(--text); border-color: var(--border-strong); }
    .ui-button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--muted);
      border-radius: 999px;
      padding: 0.38rem 0.7rem;
      font-size: 0.72rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge[data-tone="accent"] {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--text);
    }
    .badge[data-tone="success"] {
      border-color: rgba(15, 118, 110, 0.28);
      background: rgba(15, 118, 110, 0.08);
      color: var(--success);
    }
    .badge[data-tone="danger"] {
      border-color: rgba(220, 38, 38, 0.28);
      background: rgba(220, 38, 38, 0.08);
      color: var(--danger);
    }
    .metric {
      border: 1px solid var(--border);
      background: var(--surface-2);
      border-radius: 16px;
      padding: 0.8rem 0.85rem;
      min-width: 0;
    }
    .metric-label {
      color: var(--muted);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }
    .metric-value {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      font-variant-numeric: tabular-nums;
      margin-top: 0.3rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .metric-note {
      color: var(--muted);
      font-size: 0.76rem;
      margin-top: 0.18rem;
      line-height: 1.3;
    }
    .section-grid {
      display: grid;
      gap: 1rem;
      min-width: 0;
    }
    .empty-state {
      border: 1px dashed var(--border-strong);
      background: var(--surface-2);
      border-radius: 18px;
      padding: 1.15rem;
      color: var(--muted);
    }
    .empty-state strong {
      display: block;
      color: var(--text);
      margin-bottom: 0.35rem;
      font-size: 0.95rem;
    }
    .table-row {
      display: grid;
      gap: 0.6rem;
      align-items: center;
      min-width: 0;
    }
    .table-row--salary {
      grid-template-columns: minmax(0, 1fr) 5.5rem 8.5rem;
    }
    .table-row--compact {
      grid-template-columns: minmax(0, 1fr) 8rem 1.5rem;
    }
    .table-row--capital {
      grid-template-columns: minmax(0, 1fr) minmax(0, 10rem) auto;
    }
    .table-row > * { min-width: 0; }
    @media (max-width: 640px) {
      .table-row--salary,
      .table-row--compact,
      .table-row--capital {
        grid-template-columns: minmax(0, 1fr);
      }
    }
  </style>
  <script>
    (function () {
      try {
        const mode = localStorage.getItem("fin-v3-theme") || "system";
        const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = mode === "system" ? (prefersDark ? "dark" : "light") : mode;
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      } catch (e) {}
    })();
  </script>
</head>

      try {

        return value === null ? fallback : value;
      } catch (e) {
        return fallback;
      }
    };

        localStorage.setItem(key, value);

    function NumInput({ value, onChange, placeholder = "0", right = false, large = false, className = "" }) {
      return (
        <input
          type="text"
          inputMode="decimal"
          value={value}
          onChange={e => onChange(e.target.value)}
          placeholder={placeholder}
          className={`ui-input ${large ? "ui-input--large" : "ui-input--compact"} ${right ? "ui-input--right" : ""} ${className}`}
        />
      );

      const [snapshots, setSnapshots] = useState([]);
      const [snapshotCompare, setSnapshotCompare] = useState(null);
      const startupReqRef = React.useRef(0);
      const settingsTimerRef = React.useRef(null);
      const accountTimersRef = React.useRef({});

      const patchSettings = async (payload) => {
        const res = await fetch("/api/settings", {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!res.ok) throw new Error("settings patch failed");
      };

      const patchAccount = async (id, payload) => {
        const res = await fetch(`/api/accounts/${id}`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!res.ok) throw new Error("account patch failed");
      };

      const refreshSnapshots = async () => {
        const res = await fetch("/api/snapshots");
        if (!res.ok) throw new Error("snapshots load failed");
        setSnapshots(await res.json());
      };

      const compareLatestSnapshots = async () => {
        if (snapshots.length < 2) return;
        const right = snapshots[0];
        const left = snapshots[1];
        const res = await fetch(`/api/snapshots/compare?left_id=${left.id}&right_id=${right.id}`);
        if (!res.ok) throw new Error("snapshot compare failed");
        setSnapshotCompare(await res.json());
      };

      const applyLocalImport = async () => {
        if (!importDraft) return;
        setSaveState({ settings: "pending", accounts: {} });
        try {
          await patchSettings({
            categories: importDraft.cats || cats,
            deductions: importDraft.deds || deds,
            usdRate: importDraft.usdRate || usdRate,
            mortgage: importDraft.mortgage || mortgage,
          });
          await Promise.all((importDraft.accs || []).map(a => patchAccount(a.id, { val: a.val || "", currency: a.currency || "RUB" })));
          setImportDraft(null);
          setRetryToken(t => t + 1);
        } catch (e) {
          setSaveState(p => ({ ...p, settings: "failed" }));
        }
      };

      useEffect(() => {
        const reqId = startupReqRef.current + 1;
        startupReqRef.current = reqId;
        let ignore = false;
        (async () => {
          setStartupError("");
          setImportDraft(null);
          setLoading(true);
          try {
            const [accRes, settingsRes, snapshotRes] = await Promise.all([fetch("/api/accounts"), fetch("/api/settings"), fetch("/api/snapshots")]);
            if (ignore || startupReqRef.current !== reqId) return;
            if (!accRes.ok || !settingsRes.ok || !snapshotRes.ok) throw new Error("startup fetch failed");
            const apiAccounts = await accRes.json();
            const apiSettings = await settingsRes.json();
            const apiSnapshots = await snapshotRes.json();
            setSnapshots(apiSnapshots);

            const isBackendEmpty = !Array.isArray(apiAccounts) || apiAccounts.length === 0;
            if (isBackendEmpty) {
              const raw = safeStorageGet(DATA_STORAGE_KEY, null);
              if (raw) {
                try {
                  const d = JSON.parse(raw);
                  setImportDraft(d);
                } catch (e) {}
              }
            } else {
              setAccs(apiAccounts);
              if (apiSettings.categories) setCats(apiSettings.categories);
              if (apiSettings.deductions) setDeds(apiSettings.deductions);
              if (apiSettings.usdRate) setUsdRate(apiSettings.usdRate);
              if (apiSettings.mortgage) setMortgage(apiSettings.mortgage);
            }
          } catch (e) {
            if (!ignore && startupReqRef.current === reqId) setStartupError("Не удалось загрузить данные с backend.");
          } finally {
            if (!ignore && startupReqRef.current === reqId) setLoading(false);
          }
        })();
        return () => { ignore = true; };
      }, [retryToken]);

      useEffect(() => {
        safeStorageSet(THEME_STORAGE_KEY, themeMode);
      }, [themeMode]);

      useEffect(() => {
        const mq = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;
        if (!mq) return;
        const onChange = (event) => setPrefersDark(event.matches);
        setPrefersDark(mq.matches);
        if (mq.addEventListener) {
          mq.addEventListener("change", onChange);
          return () => mq.removeEventListener("change", onChange);
        }
        mq.addListener(onChange);
        return () => mq.removeListener(onChange);
      }, []);

      const resolvedTheme = themeMode === "system" ? (prefersDark ? "dark" : "light") : themeMode;

      useEffect(() => {
        const root = document.documentElement;
        root.dataset.theme = resolvedTheme;
        root.style.colorScheme = resolvedTheme;
      }, [resolvedTheme]);

      useEffect(() => () => {
        if (settingsTimerRef.current) clearTimeout(settingsTimerRef.current);
        Object.values(accountTimersRef.current).forEach((t) => clearTimeout(t));

      useEffect(() => {
        if (loading || importDraft) return;
        if (settingsTimerRef.current) clearTimeout(settingsTimerRef.current);
        setSaveState(p => ({ ...p, settings: "pending" }));
        settingsTimerRef.current = setTimeout(async () => {
          try {
            await patchSettings({ categories: cats, deductions: deds, usdRate, mortgage });
            setSaveState(p => ({ ...p, settings: "ok" }));
          } catch (e) {
            setSaveState(p => ({ ...p, settings: "failed" }));

        }, 350);
      }, [cats, deds, usdRate, mortgage, loading, importDraft]);

      const updateAccountVal = (id, val) => {
        setAccs(p => p.map(x => x.id === id ? { ...x, val } : x));

        setSaveState(p => ({ ...p, accounts: { ...p.accounts, [id]: "pending" } }));
        accountTimersRef.current[id] = setTimeout(async () => {
          try {
            await patchAccount(id, { val });
            setSaveState(p => ({ ...p, accounts: { ...p.accounts, [id]: "ok" } }));
          } catch (e) {
            setSaveState(p => ({ ...p, accounts: { ...p.accounts, [id]: "failed" } }));
          }
        }, 300);
      };

      const retrySettingsSave = async () => {
        setSaveState(p => ({ ...p, settings: "pending" }));
        try {
          await patchSettings({ categories: cats, deductions: deds, usdRate, mortgage });
          setSaveState(p => ({ ...p, settings: "ok" }));
        } catch (e) {
          setSaveState(p => ({ ...p, settings: "failed" }));
        }
      };

      const retryAccountSave = async (id) => {
        const row = accs.find(a => a.id === id);
        if (!row) return;
        setSaveState(p => ({ ...p, accounts: { ...p.accounts, [id]: "pending" } }));
        try {
          await patchAccount(id, { val: row.val });
          setSaveState(p => ({ ...p, accounts: { ...p.accounts, [id]: "ok" } }));
        } catch (e) {
          setSaveState(p => ({ ...p, accounts: { ...p.accounts, [id]: "failed" } }));
        }
      };

const badgeValue = useMemo(() => {
      const badgeDeduction = deds.find(d => d.name === "Бейдж");
      return parse(badgeDeduction?.val || 0);
    }, [deds]);
    
    const ndflFromBadge = useMemo(() => badgeValue * 0.13, [badgeValue]);
    
    const totalDeds = useMemo(() => {
      // Считаем все вычеты, кроме бейджа, но добавляем НДФЛ от бейджа
      const otherDeds = deds
        .filter(d => d.name !== "Бейдж")
        .reduce((s, d) => s + parse(d.val), 0);
      return otherDeds + ndflFromBadge;
    }, [deds, ndflFromBadge]);
    
    const net = useMemo(() => Math.max(0, parse(gross) - totalDeds), [gross, totalDeds]);
      const totalPct  = useMemo(() => cats.reduce((s, c) => s + parse(c.pct), 0), [cats]);
      const dist      = useMemo(() => cats.map(c => ({ ...c, amount: net * parse(c.pct) / 100 })), [cats, net]);
      const pctOk     = Math.abs(totalPct - 100) < 0.05;

      const totalFact    = useMemo(() => accsF.filter(a => a.type !== "Долг").reduce((s,a) => s+a.final, 0), [accsF]);

      const rychlye      = useMemo(() => accsF.filter(a => a.cat === "Быстрые").reduce((s,a)=>s+a.final,0), [accsF]);
      const semejnye     = useMemo(() => accsF.filter(a => a.cat === "Семейные").reduce((s,a)=>s+a.final,0), [accsF]);
      const syn          = useMemo(() => accsF.filter(a => a.cat === "Сын").reduce((s,a)=>s+a.final,0), [accsF]);
      const invest       = useMemo(() => accsF.filter(a => a.type === "ИИС").reduce((s,a)=>s+a.final,0), [accsF]);
      const withMortgage = useMemo(() => totalCapital - parse(mortgage), [totalCapital, mortgage]);

      const copy = (text) => {
        navigator.clipboard.writeText(text).catch(() => {});
        setFlash("Скопировано!");

      const copyDist = () => {

        let deductionsInfo = `Вычеты: ${fmt(totalDeds)}`;

        copy(`${MONTHS[month]} ${year}, ${payDay} число\n${rows}\n\nЧистыми: ${fmt(net)}\n${deductionsInfo}`);
      };

      const copyCapital = () => {
        const rows = accsF.map(a => `${a.bank} / ${a.name}\t${fmt(a.final)}`).join("\n");
        const sum = `\n\nВесь капитал (факт)\t${fmt(totalFact)}\nКапитал (с долгами)\t${fmt(totalCapital)}\nБыстрые\t${fmt(rychlye)}\nСемейные\t${fmt(semejnye)}\nСын\t${fmt(syn)}\nИИС\t${fmt(invest)}\nС ипотекой\t${fmt(withMortgage)}\nКурс $\t${rate}`;
        copy(rows + sum);
      };

      const saveSalaryEvent = async () => {
        const isoDate = `20${String(year).padStart(2, "0")}-${String(month + 1).padStart(2, "0")}-${String(payDay).padStart(2, "0")}`;
        const payload = {
          eventDate: isoDate,
          eventType: salaryEventType,
          gross: String(gross || ""),
          deductions: String(totalDeds),
          net: String(net),
          distribution: dist.map(d => ({ id: d.id, name: d.name, pct: d.pct, amount: d.amount })),

        const res = await fetch("/api/salary-events", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),

        if (!res.ok) throw new Error("salary event save failed");
        setActionFlash("Salary event сохранен");
      };

      const createSnapshot = async () => {
        const label = `${MONTHS[month]} ${year} / ${payDay}`;
        const res = await fetch("/api/snapshots", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ label }),

        if (!res.ok) throw new Error("snapshot create failed");
        await refreshSnapshots();
        setSnapshotCompare(null);
        setActionFlash("Snapshot создан");
      };

      const themeLabel = THEME_MODES.find(t => t.id === themeMode)?.label || "System";

      if (loading) return (
        <div className="min-h-screen flex items-center justify-center text-sm" style={{ color: "var(--muted)" }}>
          Загрузка…
        </div>

      if (startupError) return (
        <div className="min-h-screen flex items-center justify-center">
          <div className="card p-5 max-w-md w-full">
            <div className="card-title">Ошибка запуска</div>
            <div className="card-subtitle mt-2">{startupError}</div>
            <button type="button" className="ui-button ui-button-primary mt-4" onClick={() => setRetryToken(t => t + 1)}>Повторить</button>
          </div>
        </div>

      if (importDraft) return (
        <div className="min-h-screen flex items-center justify-center">

            <div className="card-title">Найдены локальные данные</div>

            </div>
            <div className="mt-4 flex flex-wrap gap-2">
              <button type="button" className="ui-button ui-button-primary" onClick={applyLocalImport}>Импортировать в backend</button>
              <button type="button" className="ui-button ui-button-secondary" onClick={() => setImportDraft(null)}>Начать с backend</button>
            </div>
            {saveState.settings === "failed" && <div className="mt-3 badge" data-tone="danger">Импорт не сохранён</div>}
          </div>
        </div>
      );

      return (
        <div className="app-shell min-h-screen">
          {flash && (
            <div className="fixed top-4 right-4 z-50 badge" data-tone="accent">
              {flash}
            </div>
          )}

          <div className="mx-auto max-w-7xl px-3 py-3 sm:px-4 sm:py-4 lg:px-6">
            <div className="topbar rounded-3xl px-4 py-4 sm:px-5">
              <div className="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
                <div className="min-w-0">
                  <div className="kicker">Финансовый помощник</div>
                  <h1 className="title mt-2">Ритуалы, капитал и модель без лишнего шума</h1>
                  <p className="lead mt-2 max-w-2xl">
                    Первый экран ведёт в зарплатный ритуал, а тяжелые действия остаются честно отключенными до появления backend.
                  </p>
                </div>
                <div className="flex items-center gap-2 self-start lg:self-auto">
                  <span className="badge" data-tone="accent">Theme: {themeLabel}</span>
                  <span className="badge" data-tone={saveState.settings === "failed" ? "danger" : saveState.settings === "pending" ? "accent" : "success"}>
                    {saveState.settings === "failed" ? "Сохранение настроек: ошибка" : saveState.settings === "pending" ? "Сохранение настроек…" : "Настройки сохранены"}
                  </span>
                  {saveState.settings === "failed" && <button type="button" className="ui-button ui-button-secondary" onClick={retrySettingsSave}>Повторить</button>}
                </div>
              </div>
              <div className="mt-4 flex flex-wrap gap-2">
                {THEME_MODES.map(mode => (
                  <ThemeTab
                    key={mode.id}
                    active={themeMode === mode.id}
                    label={mode.label}
                    onClick={() => setThemeMode(mode.id)}
                  />
                ))}
              </div>
            </div>

            <div className="mt-4 grid grid-cols-2 gap-2 sm:grid-cols-4">
              {NAV_ITEMS.map(item => (
                <NavTab
                  key={item.id}
                  active={tab === item.id}
                  label={item.label}
                  hint={item.hint}
                  onClick={() => setTab(item.id)}
                />
              ))}
            </div>

            <div className="mt-4">
              {tab === "rituals" && (
                <div className="grid gap-4 lg:grid-cols-[minmax(0,1.35fr)_minmax(320px,0.78fr)]">
                  <div className="section-grid">
                    <Card className="p-4 sm:p-5">
                      <SectionHeader
                        kicker="Ритуалы"
                        title="Зарплатный день"
                        summary="Всё важное для распределения зарплаты на одном экране."
                        action={<span className="badge" data-tone="accent">Локальные расчеты</span>}
                      />
                      <div className="grid gap-3 sm:grid-cols-3">
                        <div>
                          <div className="kicker mb-2">Месяц</div>
                          <select
                            value={month}
                            onChange={e => setMonth(+e.target.value)}
                            className="ui-input ui-input--compact"
                          >
                            {MONTHS.map((m, i) => <option key={i} value={i}>{m}</option>)}
                          </select>
                        </div>
                        <div>
                          <div className="kicker mb-2">Год</div>
                          <input
                            type="number"
                            value={year}
                            onChange={e => setYear(+e.target.value)}
                            className="ui-input ui-input--compact ui-input--right"
                          />

                        <div>

                          <select value={salaryEventType} onChange={e => setSalaryEventType(e.target.value)} className="ui-input ui-input--compact">
                            <option value="5th_payday">5th payday</option>
                            <option value="20th_payday">20th payday</option>

                      </div>
                    </Card>

<Card className="p-4 sm:p-5">
      <SectionHeader
        kicker="Вычеты"

      <div className="grid gap-2 sm:grid-cols-2">

                    <Card className="p-4 sm:p-5">
                      <SectionHeader

                        <Metric label="Курс $" value={`${fmt(rate)}`} note="локально сохранён" />

                          disabled
                          className="ui-button ui-button-secondary"
                          title="Синхронизация недоступна до следующего этапа"
                        >
                          Синхронизировать backend
                        </button>
                        <div className="empty-state">
                          <strong>Капитал обновляется локально</strong>
                          Финансовые формулы работают локально; snapshot и salary event сохраняются только по явной кнопке.
                        </div>
                        {actionFlash && <div className="text-xs text-[var(--accent)]">{actionFlash}</div>}
                      </div>
                    </Card>
                  </div>
                </div>
              )}

              {tab === "capital" && (
                <div className="grid gap-4 xl:grid-cols-[minmax(0,1.2fr)_minmax(320px,0.8fr)]">
                  <div className="section-grid">
                    <Card className="p-4 sm:p-5">
                      <SectionHeader
                        kicker="Капитал"
                        title="Счета и банки"
                        summary="Редактирование баланса не меняет формулы расчета капитала."
                      />
                      <div className="flex flex-col gap-3 sm:flex-row sm:items-end">
                        <div className="min-w-0 flex-1">
                          <div className="kicker mb-2">Курс $ / ₽</div>
                          <NumInput value={usdRate} onChange={setUsdRate} right className="w-full sm:w-28" />
                        </div>
                        <div className="min-w-0 flex-1">
                          <div className="kicker mb-2">Остаток ипотеки ₽</div>
                          <NumInput value={mortgage} onChange={setMortgage} right className="w-full sm:w-40" />
                        </div>
                      </div>
                    </Card>

                    {BANK_ORDER.map(bank => {
                      const bankAccs = accsF.filter(a => a.bank === bank);
                      if (!bankAccs.length) return null;
                      const bankTotal = bankAccs.reduce((s, a) => s + a.final, 0);
                      const color = BANK_COLORS[bank] || "#9ca3af";
                      const isOpen = expanded[bank];
                      return (
                        <Card key={bank} className="overflow-hidden">
                          <button
                            type="button"
                            onClick={() => setExpanded(p => ({...p, [bank]: !p[bank]}))}
                            className="flex w-full items-center justify-between gap-3 px-4 py-3 text-left"
                            style={{ background: "var(--surface-2)" }}
                          >
                            <div className="flex min-w-0 items-center gap-2">
                              <div className="h-2.5 w-2.5 shrink-0 rounded-full" style={{ backgroundColor: color }} />
                              <span className="truncate text-xs font-bold uppercase tracking-[0.14em]" style={{ color }}>{bank}</span>
                            </div>
                            <div className="flex items-center gap-3">
                              <span className={`text-xs font-bold tabular-nums ${bank === "Долги" ? "text-[var(--danger)]" : "text-[var(--text)]"}`}>
                                {bankTotal < 0 ? "−" : ""}{fmt(Math.abs(bankTotal))} ₽
                              </span>
                              <span className="text-xs text-[var(--muted)]">{isOpen ? "▲" : "▼"}</span>
                            </div>
                          </button>
                          {isOpen && (
                            <div className="divide-y divide-[var(--border)]">
                              {bankAccs.map(a => (
                                <div key={a.id} className="table-row table-row--capital px-4 py-3">
                                  <div className="min-w-0">
                                    <div className="truncate text-sm font-medium">{a.name}</div>
                                    <div className="text-xs text-[var(--muted)]">{a.type} · {a.cat}</div>
                                  </div>
                                  <div className="min-w-0">
                                    <NumInput
                                      value={a.val}
                                      onChange={v => updateAccountVal(a.id, v)}
                                      right
                                      className="w-full"
                                      placeholder="0"
                                    />
                                  </div>
                                  <div className="text-xs text-[var(--muted)]">
                                    {a.currency === "USD" ? "$" : "₽"}
                                    {saveState.accounts[a.id] === "pending" && <div>Сохр…</div>}
                                    {saveState.accounts[a.id] === "failed" && <button type="button" className="ui-button ui-button-ghost px-0 py-0" onClick={() => retryAccountSave(a.id)}>retry</button>}
                                  </div>
                                </div>
                              ))}
                            </div>
                          )}
                        </Card>
                      );
                    })}
                  </div>

                  <div className="section-grid">
                    <Card className="p-4 sm:p-5">
                      <SectionHeader
                        kicker="Итоги"
                        title="Капитал сегодня"
                        summary="Все значения считаются из текущих локальных данных."
                        action={<button type="button" onClick={copyCapital} className="ui-button ui-button-primary">Копировать</button>}
                      />
                      <div className="grid gap-2">
                        {[
                          { label: "Весь капитал (факт)", val: totalFact, usd: true, bold: true },
                          { label: "Капитал с долгами", val: totalCapital, usd: true, bold: false },
                          { label: "Быстрые", val: rychlye, usd: false, indent: true },
                          { label: "Семейные", val: semejnye, usd: false, indent: true },
                          { label: "Сын", val: syn, usd: false, indent: true },
                          { label: "ИИС", val: invest, usd: false, indent: true },
                          { label: "С ипотекой", val: withMortgage, usd: true, red: withMortgage < 0 },
                        ].map(r => (
                          <div key={r.label} className="flex items-start justify-between gap-3 rounded-2xl border border-[var(--border)] bg-[var(--surface-2)] px-4 py-3">
                            <span className={`text-xs uppercase tracking-[0.12em] ${r.indent ? "pl-2 text-[var(--muted)]" : "text-[var(--muted)]"}`}>{r.label}</span>
                            <div className="text-right">
                              <div className={`tabular-nums ${r.bold ? "text-base font-bold text-[var(--accent)]" : r.red ? "text-[var(--danger)]" : "text-sm font-semibold text-[var(--text)]"}`}>
                                {fmt(r.val)} ₽
                              </div>
                              {r.usd && rate > 0 && <div className="text-xs tabular-nums text-[var(--muted)]">${fmt(r.val / rate)}</div>}
                            </div>
                          </div>
                        ))}
                      </div>
                    </Card>

                    <Card className="p-4 sm:p-5">
                      <SectionHeader
                        kicker="Статус"
                        title="Backend-подсказки"
                        summary="Эти действия оставлены как недоступные заглушки."
                      />
                      <div className="grid gap-2">
                        <button type="button" disabled className="ui-button ui-button-secondary">Обновить snapshot</button>
                        <button type="button" disabled className="ui-button ui-button-secondary">Синхронизировать backend</button>
                        <div className="empty-state">
                          <strong>Текущий режим</strong>
                          Ручная работа со счетами и курсом доступна локально. Внешние операции отключены до backend-stage.
                        </div>
                      </div>
                    </Card>
                  </div>
                </div>
              )}

              {tab === "history" && (
                <div className="grid gap-4 xl:grid-cols-[minmax(0,1fr)_320px]">
                  <Card className="p-4 sm:p-5">
                    <SectionHeader
                      kicker="История"
                      title={snapshots.length ? "App-created snapshots" : "Снимков пока нет"}
                      summary="История показывает только явные snapshot-записи из backend."
                      action={<span className="badge" data-tone={snapshots.length ? "success" : "danger"}>{snapshots.length} snapshots</span>}
                    />
                    {snapshots.length === 0 ? (
                      <div className="empty-state">
                        <strong>Нет подтвержденных снимков</strong>
                        История не импортирует старые таблицы и не строит вымышленные графики. Создайте snapshot в ритуале, чтобы здесь появилась реальная точка.
                      </div>
                    ) : (
                      <div className="grid gap-2">
                        {snapshots.slice(0, 8).map(s => (
                          <div key={s.id} className="rounded-2xl border border-[var(--border)] bg-[var(--surface-2)] px-4 py-3">
                            <div className="flex items-start justify-between gap-3">
                              <div>
                                <div className="font-bold">{s.label}</div>
                                <div className="text-xs text-[var(--muted)]">{s.timestamp} · {s.payloadVersion}</div>
                              </div>
                              <div className="text-right tabular-nums text-sm font-bold text-[var(--accent)]">
                                {fmt(s.totals.fullCapital)} ₽
                              </div>
                            </div>
                            <div className="mt-2 grid gap-2 sm:grid-cols-3">
                              <Metric label="Без долгов" value={`${fmt(s.totals.capitalExcludingDebts)} ₽`} />
                              <Metric label="С ипотекой" value={`${fmt(s.totals.mortgageAdjustedPosition)} ₽`} />
                              <Metric label="Курс $" value={fmt(s.totals.currencyAdjustedTotals?.usdRate)} />
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                    <div className="mt-4 flex flex-wrap gap-2">
                      <button type="button" className="ui-button ui-button-secondary" onClick={() => refreshSnapshots().catch(() => setActionFlash("Ошибка обновления snapshots"))}>Обновить snapshots</button>
                      <button type="button" disabled={snapshots.length < 2} className="ui-button ui-button-primary" onClick={() => compareLatestSnapshots().catch(() => setActionFlash("Ошибка сравнения snapshots"))}>Сравнить 2 последних</button>
                    </div>
                    {snapshotCompare && (
                      <div className="mt-4 rounded-2xl border border-[var(--border)] bg-[var(--surface-2)] px-4 py-3">
                        <div className="kicker">Comparison</div>
                        <div className="mt-2 grid gap-2 sm:grid-cols-3">
                          <Metric label="Капитал" value={`${fmt(snapshotCompare.delta.fullCapital)} ₽`} />
                          <Metric label="Без долгов" value={`${fmt(snapshotCompare.delta.capitalExcludingDebts)} ₽`} />
                          <Metric label="С ипотекой" value={`${fmt(snapshotCompare.delta.mortgageAdjustedPosition)} ₽`} />
                        </div>
                      </div>
                    )}
                  </Card>

                  <div className="section-grid">
                    <Card className="p-4 sm:p-5">
                      <SectionHeader
                        kicker="Проверка"
                        title="Что можно сказать сейчас"
                        summary="Только локальная модель и текущие расчеты."
                      />
                      <div className="grid gap-2">
                        <Metric label="Последний период" value={snapshots[0]?.label || "Нет данных"} note="Только explicit snapshots" tone={snapshots.length ? "success" : "danger"} />
                        <Metric label="Готовность" value={snapshots.length >= 2 ? "Comparison ready" : "Need 2 snapshots"} note={snapshotCompare ? "Сравнение загружено" : "API сравнения готов для двух снимков"} />
                      </div>
                    </Card>
                  </div>
                </div>
              )}

              {tab === "settings" && (
                <div className="grid gap-4 xl:grid-cols-[minmax(0,1.05fr)_minmax(320px,0.95fr)]">
                  <div className="section-grid">
                    <Card className="p-4 sm:p-5">
                      <SectionHeader
                        kicker="Тема"
                        title="System / Light / Dark"
                        summary="Меняет только семантические токены, не финансовые данные."
                      />
                      <div className="grid grid-cols-3 gap-2">
                        {THEME_MODES.map(mode => (
                          <ThemeTab
                            key={mode.id}
                            active={themeMode === mode.id}
                            label={mode.label}
                            onClick={() => setThemeMode(mode.id)}
                          />
                        ))}
                      </div>
                    </Card>

                    <Card className="p-4 sm:p-5">
                      <SectionHeader
                        kicker="Категории"
                        title="Модель распределения"
                        summary="Текущие ритуальные проценты и названия редактируются локально."
                        action={<span className="badge" data-tone={pctOk ? "success" : "danger"}>Σ {fmt(totalPct)}%</span>}
                      />
                      <div className="grid gap-2">
                        {cats.map(c => (
                          <div key={c.id} className="table-row table-row--compact rounded-2xl border border-[var(--border)] bg-[var(--surface-2)] px-3 py-3">
                            <input
                              type="text"
                              value={c.name}
                              onChange={e => setCats(p => p.map(x => x.id === c.id ? {...x, name: e.target.value} : x))}
                              className="ui-input ui-input--compact"
                            />
                            <input
                              type="number"
                              value={c.pct}
                              step="0.1"
                              onChange={e => setCats(p => p.map(x => x.id === c.id ? {...x, pct: e.target.value} : x))}
                              className="ui-input ui-input--compact ui-input--right"
                            />
                            <button
                              type="button"
                              onClick={() => setCats(p => p.filter(x => x.id !== c.id))}
                              className="ui-button ui-button-ghost px-0 py-0 text-lg"
                              aria-label={`Удалить категорию ${c.name}`}
                            >
                              ×
                            </button>
                          </div>
                        ))}
                      </div>
                      <div className="mt-3">
                        <button
                          type="button"
                          onClick={() => setCats(p => [...p, { id: Date.now(), name: "Новая", pct: "0" }])}
                          className="ui-button ui-button-secondary"
                        >
                          Добавить категорию
                        </button>
                      </div>
                    </Card>

                    <Card className="p-4 sm:p-5">
                      <SectionHeader
                        kicker="Вычеты"
                        title="Дефолтные значения"
                        summary="Данные здесь используются в зарплатном ритуале."
                      />
                      <div className="grid gap-2">
                        {deds.map(d => (
                          <div key={d.id} className="table-row table-row--compact rounded-2xl border border-[var(--border)] bg-[var(--surface-2)] px-3 py-3">
                            <input
                              type="text"
                              value={d.name}
                              onChange={e => setDeds(p => p.map(x => x.id === d.id ? {...x, name: e.target.value} : x))}
                              className="ui-input ui-input--compact"
                            />
                            <NumInput value={d.val} onChange={v => setDeds(p => p.map(x => x.id === d.id ? {...x, val: v} : x))} right className="w-full" />
                            <button
                              type="button"
                              onClick={() => setDeds(p => p.filter(x => x.id !== d.id))}
                              className="ui-button ui-button-ghost px-0 py-0 text-lg"
                              aria-label={`Удалить вычет ${d.name}`}
                            >
                              ×
                            </button>
                          </div>
                        ))}
                      </div>
                      <div className="mt-3">
                        <button
                          type="button"
                          onClick={() => setDeds(p => [...p, { id: Date.now(), name: "Новый", val: "" }])}
                          className="ui-button ui-button-secondary"
                        >
                          Добавить вычет
                        </button>
                      </div>
                    </Card>
                  </div>

                  <div className="section-grid">
                    <Card className="p-4 sm:p-5">
                      <SectionHeader
                        kicker="Модель"
                        title="Текущее состояние"
                        summary="Сводка того, что сейчас поддерживает финансовую модель."
                      />
                      <div className="grid gap-2 sm:grid-cols-2">
                        <Metric label="Категорий" value={String(cats.length)} />
                        <Metric label="Вычетов" value={String(deds.length)} />
                        <Metric label="Счетов" value={String(accs.length)} />
                        <Metric label="Курс $" value={fmt(rate)} />
                        <Metric label="Ипотека" value={fmt(mortgage)} />
                        <Metric label="Капитал (факт)" value={`${fmt(totalFact)} ₽`} />
                      </div>
                    </Card>

                    <Card className="p-4 sm:p-5">
                      <SectionHeader
                        kicker="Поддержка"
                        title="Backend действия"
                        summary="Пока только заглушки, чтобы не обещать работающий API."
                      />
                      <div className="grid gap-2">
                        <button type="button" disabled className="ui-button ui-button-secondary">Сохранить snapshot модели</button>
                        <button type="button" disabled className="ui-button ui-button-secondary">Синхронизировать backend</button>
                        <div className="empty-state">
                          <strong>Сейчас доступно только локальное редактирование</strong>
                          Категории, вычеты, счета, курс и ипотека поддерживаются в текущем состоянии без внешнего источника.
                        </div>
                      </div>
                    </Card>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
